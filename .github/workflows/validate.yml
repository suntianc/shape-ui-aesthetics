name: Validate repository

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  repository-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --requirement requirements-dev.txt
      - run: python tools/validate_repository.py --mode candidate
