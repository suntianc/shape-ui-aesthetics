name: Validate repository

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read

jobs:
  repository-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --requirement requirements-dev.txt
      - name: Reject moved version tags
        if: startsWith(github.ref, 'refs/tags/v') && github.event.before != '0000000000000000000000000000000000000000'
        run: |
          echo "Published version tags are immutable; create a new semantic version."
          exit 1
      - run: python tools/validate_repository.py --mode candidate --immutable-from "$IMMUTABLE_BASE"
        env:
          IMMUTABLE_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
      - name: Validate tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        run: python tools/validate_repository.py --mode release --version "${GITHUB_REF_NAME#v}"
